baseURL = 'https://bettzen.github.io/' # 【重要】请将 `your-username` 替换为您实际的GitHub用户名
languageCode = 'zh-CN'
title = 'bettzen'                  # 【请修改】您网站的名称
theme = "mainroad"  # 或者 "Mainroad"，必须与文件夹名一致

[params]
  # 网站描述，用于搜索引擎显示
  description = '中国高档女装供应商。'
  # 网站关键词
  keywords = ['高档女装', '女装贸易', '服装', '中国服装']
  # 在首页文章列表中显示摘要
  showSummary = true
  # 显示文章阅读时间估算
  showReadingTime = true

[menu]
  # 定义网站导航栏菜单
  # identifier: 菜单项的唯一标识符
  # name: 在页面上显示的名称
  # url: 点击后跳转的链接
  # weight: 排列顺序，数字越小越靠前
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10

  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20

  [[menu.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 30

  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 40

# 启用Google Analytics（可选，部署后如果需要统计流量再配置）
# [services.googleAnalytics]
#   id = 'G-XXXXXXXXXX' # 替换为您的GA4测量ID

# 网站社交链接（可选，可先在主题配置中查看支持哪些）
# [params.social]
#   github = 'https://github.com/your-username'
#   email = 'mailto:your-email@example.com'